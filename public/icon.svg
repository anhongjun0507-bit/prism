<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="25%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="75%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#brand)"/>
  <!-- Inner prism triangle -->
  <g filter="url(#glow)">
    <path d="M256 96 L416 384 H96 L256 96 Z" fill="white" fill-opacity="0.96"/>
    <path d="M256 96 L416 384 H96 L256 96 Z" stroke="white" stroke-opacity="0.4" stroke-width="6" fill="none"/>
  </g>
</svg>
